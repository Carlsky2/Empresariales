<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crear Cuenta</title>
  <style>
    body { font-family: Arial; background: #F4F6FA; padding: 20px; }
    h2 { color: #1F4E79; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
    button { background: #1F4E79; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-right: 8px; }
    button:hover { background: #2E6BAA; }
    .btn-sec { background: #666; }
    .ok { color: green; margin-top: 10px; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Crear Cuenta de Ahorros</h2>

  <label>Número:</label>
  <input type="number" id="numero" placeholder="Número de cuenta">

  <label>Titular:</label>
  <input type="text" id="titular" placeholder="Nombre del titular">

  <label>Saldo:</label>
  <input type="number" id="saldo" placeholder="Saldo inicial">

  <label>Tasa (%):</label>
  <input type="number" id="tasa" placeholder="Tasa de interés" step="0.01">

  <button onclick="crear()">Crear</button>
  <button class="btn-sec" onclick="window.close()">Cerrar</button>

  <p id="resultado"></p>

  <script>
    function formatearFechaLocal() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hours = String(d.getHours()).padStart(2, '0');
      const minutes = String(d.getMinutes()).padStart(2, '0');
      const seconds = String(d.getSeconds()).padStart(2, '0');

      return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
    }

    // 🔹 Observer activo pero solo en consola (NO en pantalla)
    if (window.api.onActualizacion) {
      window.api.onActualizacion(function(data) {
        console.log('[Observer]', data);
      });
    }

    async function crear() {
      const resultado = document.getElementById('resultado');
      resultado.className = '';
      resultado.textContent = '';

      const numero = parseInt(document.getElementById('numero').value);
      const titular = document.getElementById('titular').value.trim();
      const saldo = parseFloat(document.getElementById('saldo').value);
      const tasa = parseFloat(document.getElementById('tasa').value);

      if (isNaN(numero)) {
        resultado.className = 'error';
        resultado.textContent = '✗ Debes ingresar un número de cuenta válido';
        return;
      }

      if (!titular) {
        resultado.className = 'error';
        resultado.textContent = '✗ Debes ingresar el titular';
        return;
      }

      if (isNaN(saldo)) {
        resultado.className = 'error';
        resultado.textContent = '✗ Debes ingresar un saldo válido';
        return;
      }

      if (isNaN(tasa)) {
        resultado.className = 'error';
        resultado.textContent = '✗ Debes ingresar una tasa válida';
        return;
      }

      const cuenta = {
        numeroCuenta: numero,
        titular: titular,
        saldo: saldo,
        tasaInteres: tasa,
        fechaApertura: formatearFechaLocal(),
        estado: 'Activo'
      };

      try {
        const r = await window.api.crearCuenta(cuenta);

        if (r.success) {
          resultado.className = 'ok';
          resultado.textContent = '✓ Cuenta creada correctamente';

          document.getElementById('numero').value = '';
          document.getElementById('titular').value = '';
          document.getElementById('saldo').value = '';
          document.getElementById('tasa').value = '';
        } else {
          resultado.className = 'error';
          resultado.textContent = '✗ ' + (r.error || 'Error al crear');
          console.error('Error al crear cuenta:', r);
        }
      } catch (e) {
        resultado.className = 'error';
        resultado.textContent = '✗ Error: ' + e.message;
        console.error('Excepción al crear cuenta:', e);
      }
    }
  </script>
</body>
</html>
