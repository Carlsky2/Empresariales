<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eliminar Cuenta</title>
  <style>
    body { font-family: Arial; background: #F4F6FA; padding: 20px; }
    h2 { color: #1F4E79; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
    button { background: #1F4E79; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    button:hover { background: #2E6BAA; }
    .btn-sec { background: #666; }
    .btn-del { background: #C9102F; }
  </style>
</head>
<body>
  <h2>Eliminar Cuenta</h2>
  <label>Número:</label>
  <input type="number" id="buscar" placeholder="Número">
  <button onclick="buscar()">Buscar</button>
  <div id="info" style="display:none; background: #e8f4fd; padding: 10px; margin: 10px 0;"></div>
  <button class="btn-del" id="btn-del" onclick="eliminar()" disabled>Eliminar</button>
  <button class="btn-sec" onclick="window.close()">Cerrar</button>
  <p id="resultado"></p>

  <script>
    let cuentaActual = null;
    if (window.api.onNotificacion) {
      window.api.onNotificacion(function(data) {
        const nota = document.createElement('div');
        nota.style = 'background: #d4edda; padding: 5px; margin: 5px 0; border-radius: 3px; font-size: 12px;';
        nota.textContent = '[' + data.evento + '] ' + JSON.stringify(data.data);
        document.body.appendChild(nota);
      });
    }
    async function buscar() {
      const n = document.getElementById('buscar').value;
      if (!n) { document.getElementById('resultado').textContent = 'Ingrese número'; return; }
      try {
        const r = await window.api.buscarCuenta(parseInt(n));
        if (r.success && r.data) {
          cuentaActual = r.data;
          document.getElementById('info').innerHTML = r.data.numeroCuenta + '<br>' + r.data.titular + '<br>$' + r.data.saldo + '<br>' + r.data.estado;
          document.getElementById('info').style.display = 'block';
          document.getElementById('btn-del').disabled = false;
        } else {
          document.getElementById('resultado').textContent = '✗ No encontrada';
        }
      } catch(e) { document.getElementById('resultado').textContent = '✗ Error: ' + e.message; }
    }
    async function eliminar() {
      if (!cuentaActual) return;
      if (!confirm('¿Eliminar esta cuenta?')) return;
      try {
        const r = await window.api.eliminarCuenta(cuentaActual.numeroCuenta);
        if (r.success) {
          document.getElementById('resultado').textContent = '✓ Eliminada';
          window.close();
        } else {
          document.getElementById('resultado').textContent = '✗ ' + (r.error || 'Error');
        }
      } catch(e) { document.getElementById('resultado').textContent = '✗ Error: ' + e.message; }
    }
  </script>
</body>
</html>
