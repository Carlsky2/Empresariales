<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Listar Cuentas</title>
  <style>
    body { font-family: Arial; background: #F4F6FA; padding: 20px; }
    h2 { color: #1F4E79; }
    input, select { padding: 8px; margin-right: 10px; }
    button { background: #1F4E79; color: white; padding: 8px 15px; border: none; cursor: pointer; }
    button:hover { background: #2E6BAA; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #1F4E79; color: white; }
  </style>
</head>
<body>
  <h2>Listar Cuentas</h2>
  <input type="text" id="filtro" placeholder="Filtrar por titular">
  <select id="estado">
    <option value="Todos">Todos</option>
    <option value="Activo">Activo</option>
    <option value="Inactivo">Inactivo</option>
  </select>
  <button onclick="filtrar()">Filtrar</button>
  <button onclick="listar()">Todas</button>
  <table>
    <thead><tr><th>Número</th><th>Titular</th><th>Saldo</th><th>Estado</th></tr></thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>
    if (window.api.onNotificacion) {
      window.api.onNotificacion(function(data) {
        const nota = document.createElement('div');
        nota.style = 'background: #d4edda; padding: 5px; margin: 5px 0; border-radius: 3px; font-size: 12px;';
        nota.textContent = '[' + data.evento + '] ' + JSON.stringify(data.data);
        document.body.appendChild(nota);
      });
    }
    async function listar() {
      try {
        const r = await window.api.listarCuentas();
        dibujar(r.data || []);
      } catch(e) { alert('Error: ' + e.message); }
    }
    // ============== OBSERVER PATTERN ==============
    window.api.onActualizacion((evt) => {
      listar();
    });
    async function filtrar() {
      const t = document.getElementById('filtro').value;
      const es = document.getElementById('estado').value;
      try {
        const r = await window.api.filtrarCuentas(t, es);
        dibujar(r.data || []);
      } catch(e) { alert('Error: ' + e.message); }
    }
    function dibujar(lista) {
      const tbody = document.getElementById('tabla');
      if (!lista.length) { tbody.innerHTML = '<tr><td colspan="4">Sin resultados</td></tr>'; return; }
      tbody.innerHTML = lista.map(c => 
        '<tr><td>' + c.numeroCuenta + '</td><td>' + c.titular + '</td><td>$' + c.saldo + '</td><td>' + c.estado + '</td></tr>'
      ).join('');
    }
    listar();
  </script>
</body>
</html>
